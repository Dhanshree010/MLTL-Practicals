<!DOCTYPE html>
<html>
<head>
<title>Image Classifier</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

body{
font-family: Arial;
background:#e6dfd5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
width:350px;
}

img{
width:100%;
margin-top:15px;
border-radius:10px;
}

#results{
margin-top:15px;
font-size:16px;
}

</style>
</head>

<body>

<div class="card">

<h2>Image Classification (MobileNet)</h2>

<input type="file" id="upload" accept="image/*">

<img id="preview" hidden>

<div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
