<!DOCTYPE html>
<html>
<head>
<title>Task 2 - Test on 5 Images</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body{font-family:Arial;text-align:center;background:#fffaf2;padding:40px;}
img{width:200px;margin:10px;border-radius:10px;}
</style>

</head>

<body>

<h2>Test MobileNet on 5 Images</h2>

<input type="file" id="upload" accept="image/*" multiple>

<div id="images"></div>

<script>

let model;

async function loadModel(){
model=await mobilenet.load();
console.log("MobileNet Loaded");
}

loadModel();

const upload=document.getElementById("upload");
const container=document.getElementById("images");

upload.addEventListener("change",async function(e){

container.innerHTML="";

const files=[...e.target.files].slice(0,5);

for(let file of files){

const img=document.createElement("img");
img.src=URL.createObjectURL(file);

container.appendChild(img);

img.onload=async function(){

const predictions=await model.classify(img,1);

const percent=(predictions[0].probability*100).toFixed(2);

const text=document.createElement("p");

text.innerText=`${predictions[0].className} - ${percent}%`;

container.appendChild(text);

};

}

});

</script>

</body>
</html>
