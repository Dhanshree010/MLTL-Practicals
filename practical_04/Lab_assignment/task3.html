<!DOCTYPE html>
<html>
<head>
<title>MobileNet vs SSD-COCO</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<!-- Models -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#fffaf2;
padding:40px;
}

img{
width:320px;
margin-top:20px;
border-radius:10px;
}

.result{
margin-top:20px;
font-size:16px;
}

</style>

</head>

<body>

<h2>MobileNet vs SSD-COCO</h2>

<input type="file" id="upload" accept="image/*">

<br>

<img id="image" hidden>

<div class="result">

<h3 id="mobilenet"></h3>

<h3 id="ssd"></h3>

</div>

<script>

let mobileModel;
let ssdModel;

async function loadModels(){

console.log("Loading MobileNet...");
mobileModel = await mobilenet.load();
console.log("MobileNet Loaded");

console.log("Loading SSD COCO...");
ssdModel = await cocoSsd.load();
console.log("SSD COCO Loaded");

}

loadModels();

const upload=document.getElementById("upload");
const img=document.getElementById("image");

upload.addEventListener("change",function(e){

const file=e.target.files[0];

if(!file) return;

img.src=URL.createObjectURL(file);
img.hidden=false;

img.onload=async function(){

// MobileNet Classification
const mobilePred = await mobileModel.classify(img,1);

const mobilePercent=(mobilePred[0].probability*100).toFixed(2);

document.getElementById("mobilenet").innerText =
`MobileNet Prediction: ${mobilePred[0].className} (${mobilePercent}%)`;

console.log("MobileNet:",mobilePred);


// SSD COCO Detection
const detections = await ssdModel.detect(img);

if(detections.length>0){

const obj=detections[0];

const ssdPercent=(obj.score*100).toFixed(2);

document.getElementById("ssd").innerText =
`SSD-COCO Detection: ${obj.class} (${ssdPercent}%)`;

console.log("SSD COCO:",detections);

}else{

document.getElementById("ssd").innerText =
"SSD-COCO: No object detected";

}

};

});

</script>

</body>
</html>
