<!DOCTYPE html>
<html>
<head>
    <title>Pro Webcam Object Detection</title>
    <link rel="stylesheet" href="style.css">

    <!-- TensorFlow.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>

<div class="main-container">
    <h1>🕵️‍♀️ Object Detection Pro</h1>

    <div class="camera-card">
        <video id="webcam" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button id="startBtn">Load Model & Webcam</button>
        <button id="detectBtn" disabled>Detect Objects</button>
    </div>

    <p class="status" id="status">Model not loaded</p>
</div>

</body>
<script src="script.js"></script>
</html>
